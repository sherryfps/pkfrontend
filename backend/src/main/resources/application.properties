# Server
server.port=${PORT:9090}
server.servlet.context-path=/api

# Application Info
spring.application.name=pk-corporate-erp

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pk_corporate}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:vegeta@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
jwt.secret=${JWT_SECRET:pk-corporate-super-secret-key-2024-minimum-256-bits-required}
jwt.access-token-expiry=${JWT_ACCESS_EXPIRY:900000}
jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY:604800000}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# Razorpay
razorpay.key-id=${RAZORPAY_KEY_ID:your-key-id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:your-key-secret}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@pkcorporate.com}
spring.mail.password=${MAIL_PASSWORD:app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.com.pkcorporate=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.info.title=PK Corporate ERP API
springdoc.info.description=Enterprise Textile Manufacturing ERP REST API
springdoc.info.version=v1.0.0

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.mail.enabled=false
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET,POST,OPTIONS
management.endpoints.web.cors.allowed-headers=*

